<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Login — SmartPark AI</title>
<link rel="stylesheet" href="/css/style.css">
<style>body{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}.ac{width:100%;max-width:420px}.fg{margin-bottom:16px}.er{color:#f87171;font-size:13px;margin-top:6px;display:none}</style>
</head>
<body>
<div class="ac pe">
  <div style="text-align:center;margin-bottom:26px">
    <a href="/" style="text-decoration:none;display:inline-flex;align-items:center;gap:8px;margin-bottom:12px">
      <span style="font-size:26px">🚗</span><span class="fd" style="font-weight:800;font-size:20px;color:#fff">SmartPark <span style="color:#f97316">AI</span></span>
    </a>
    <h2 class="fd" style="font-size:22px;color:#fff">Welcome back</h2>
    <p style="color:#64748b;font-size:13px;margin-top:4px">Sign in to your account</p>
  </div>
  <div class="card" style="padding:32px">
    <form id="frm">
      <div class="fg"><label class="lbl">Email</label><div class="iw"><span class="ii">📧</span><input type="email" id="em" class="inp ic" placeholder="you@example.com" required autocomplete="email"></div></div>
      <div class="fg"><label class="lbl">Password</label><div class="iw"><span class="ii">🔒</span><input type="password" id="pw" class="inp ic" placeholder="Your password" required autocomplete="current-password"></div></div>
      <div class="er" id="er"></div>
      <button type="submit" id="sb" class="btn btn-p btn-w" style="margin-top:10px;padding:13px">Sign In</button>
    </form>
    <div style="margin-top:16px;padding:12px;border-radius:10px;background:rgba(249,115,22,0.08);border:1px solid rgba(249,115,22,0.2)">
      <p style="font-size:12px;color:#94a3b8">💡 Register first, then login. Data persists in SQLite.</p>
    </div>
    <p style="text-align:center;color:#64748b;font-size:13px;margin-top:18px">No account? <a href="/pages/register.html" style="color:#f97316;font-weight:600">Register now</a></p>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
  redirectIfAuth();
  document.getElementById('frm').addEventListener('submit',async e=>{
    e.preventDefault();
    const er=document.getElementById('er');er.style.display='none';
    const btn=document.getElementById('sb');
    btnLoading(btn,'Signing in...');
    try{
      const r=await Auth.login({email:document.getElementById('em').value.trim(),password:document.getElementById('pw').value});
      setAuth(r.token,r.user);showToast('Welcome back, '+r.user.name.split(' ')[0]+'! 👋','success');
      setTimeout(()=>window.location.href='/pages/dashboard.html',700);
    }catch(e){er.textContent=e.message;er.style.display='block';btnReset(btn);}
  });
</script>
</body></html>
