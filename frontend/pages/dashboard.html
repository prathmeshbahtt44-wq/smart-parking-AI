<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Dashboard — SmartPark AI</title>
<link rel="stylesheet" href="/css/style.css">
<style>.main{max-width:1200px;margin:0 auto;padding:32px 24px}.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:16px;margin-bottom:32px}.tc{display:grid;grid-template-columns:1fr 1fr;gap:24px}@media(max-width:700px){.tc{grid-template-columns:1fr}}.bi{padding:14px 16px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin-bottom:10px}.li{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:10px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);margin-bottom:10px;cursor:pointer;transition:all .2s;text-decoration:none}.li:hover{border-color:rgba(249,115,22,.3);transform:translateX(3px)}.qa{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-top:28px}</style>
</head>
<body>
<div id="navbar-mount"></div>
<div class="main pe">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:26px">
    <div><p style="color:#64748b;font-size:13px;margin-bottom:4px">Good day,</p><h1 class="fd" style="font-size:28px;font-weight:800" id="gr">Loading...</h1></div>
    <a href="/pages/map.html" class="btn btn-p">📍 Find Parking</a>
  </div>
  <div class="sg">
    <div class="stat-box"><div class="sl">Total Bookings</div><div class="sv" id="s1">—</div></div>
    <div class="stat-box"><div class="sl">Active</div><div class="sv" id="s2" style="color:#4ade80">—</div></div>
    <div class="stat-box"><div class="sl">Cancelled</div><div class="sv" id="s3" style="color:#f87171">—</div></div>
    <div class="stat-box"><div class="sl">Amount Spent</div><div class="sv" id="s4" style="color:#f97316;font-size:20px">—</div></div>
  </div>
  <div class="tc">
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h2 class="fd" style="font-size:17px">Recent Bookings</h2><a href="/pages/bookings.html" style="color:#f97316;font-size:13px">View all →</a>
      </div>
      <div id="rb"><div style="display:flex;justify-content:center;padding:40px"><div class="loader"></div></div></div>
    </div>
    <div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <h2 class="fd" style="font-size:17px">Parking Lots</h2><a href="/pages/map.html" style="color:#f97316;font-size:13px">Map view →</a>
      </div>
      <div id="lp"><div style="display:flex;justify-content:center;padding:40px"><div class="loader"></div></div></div>
    </div>
  </div>
  <div class="qa">
    <a href="/pages/ai-finder.html" class="card hov" style="padding:20px;text-decoration:none;text-align:center"><div style="font-size:26px;margin-bottom:8px">🤖</div><div class="fd" style="font-size:13px;font-weight:700">AI Finder</div><div style="color:#64748b;font-size:11px;margin-top:4px">Fallback spots</div></a>
    <a href="/pages/camera-scanner.html" class="card hov" style="padding:20px;text-decoration:none;text-align:center"><div style="font-size:26px;margin-bottom:8px">📷</div><div class="fd" style="font-size:13px;font-weight:700">Camera Scan</div><div style="color:#64748b;font-size:11px;margin-top:4px">Space analysis</div></a>
    <a href="/pages/vehicle-finder.html" class="card hov" style="padding:20px;text-decoration:none;text-align:center"><div style="font-size:26px;margin-bottom:8px">🚗</div><div class="fd" style="font-size:13px;font-weight:700">Vehicle Finder</div><div style="color:#64748b;font-size:11px;margin-top:4px">Fit-matched spaces</div></a>
    <a href="/pages/bookings.html" class="card hov" style="padding:20px;text-decoration:none;text-align:center"><div style="font-size:26px;margin-bottom:8px">📋</div><div class="fd" style="font-size:13px;font-weight:700">My Bookings</div><div style="color:#64748b;font-size:11px;margin-top:4px">History &amp; cancel</div></a>
  </div>
</div>
<div id="toast-container"></div>
<script src="/js/api.js"></script>
<script>
if(!requireAuth()){}
renderNavbar('dashboard');
const user=getUser();
document.getElementById('gr').textContent=(user?.name||'User')+' 👋';
async function load(){
  try{
    const[br,pr]=await Promise.all([Bookings.getMy(),Parking.getAll()]);
    const bks=br.bookings;
    document.getElementById('s1').textContent=bks.length;
    document.getElementById('s2').textContent=bks.filter(b=>b.status==='active').length;
    document.getElementById('s3').textContent=bks.filter(b=>b.status==='cancelled').length;
    document.getElementById('s4').textContent=fmtINR(bks.filter(b=>b.status==='active').reduce((s,b)=>s+b.total_amount,0));
    const rb=document.getElementById('rb');
    if(!bks.length){rb.innerHTML='<div class="card" style="padding:28px;text-align:center;color:#64748b"><div style="font-size:30px;margin-bottom:8px">📭</div><p>No bookings yet</p><a href="/pages/map.html" style="color:#f97316;font-size:13px;display:block;margin-top:8px">Book now →</a></div>';}
    else rb.innerHTML=bks.slice(0,5).map(b=>`<div class="bi"><div style="display:flex;justify-content:space-between;align-items:flex-start"><div><div style="font-weight:600;font-size:14px">${b.lot_name}</div><div style="color:#64748b;font-size:12px;margin-top:2px">${b.location} · Slot ${b.slot_number}</div><div style="color:#475569;font-size:11px;margin-top:3px">${fmtIST(b.booked_at)}</div></div><div style="text-align:right"><span class="badge ${b.status==='active'?'bg':'br'}">${b.status}</span><div style="color:#f97316;font-weight:700;font-size:14px;margin-top:5px">${fmtINR(b.total_amount)}</div></div></div></div>`).join('');
    document.getElementById('lp').innerHTML=pr.lots.map(l=>`<a class="li" href="/pages/lot.html?id=${l.id}"><div><div style="font-weight:600;font-size:14px">${l.name}</div><div style="color:#64748b;font-size:12px;margin-top:2px">${l.vehicle_type} · ${fmtINR(l.price_per_hour)}/hr</div></div><span class="badge ${availBadge(l.availableSlots,l.total_slots)}">${l.availableSlots}/${l.total_slots}</span></a>`).join('');
  }catch(e){showToast('Load failed: '+e.message,'error');}
}
load();
</script>
</body></html>
